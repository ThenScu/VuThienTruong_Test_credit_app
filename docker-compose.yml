version: '3.8'

services:
  # === TRẠM FRONTEND ===
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app           
      - /app/node_modules         
    depends_on:
      - backend
    networks:
      - saas_network

  # === TRẠM BACKEND ===
  backend:
    build: ./backend
    ports:
      - "8081:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    networks:
      - saas_network

  # === TRẠM DATABASE ===
  db:
    image: postgres:15-alpine
    container_name: saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_credits
    ports:
      - "5432:5432"
    volumes:                  
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas_network

volumes:
  postgres_data:

networks:
  saas_network:
    driver: bridge